name: Main branch code deployment
on:
  # workflow-dispatch:
  push:
    branches: [main, master]

jobs:
  Code:
    runs-on: ubuntu-latest
    steps:
      - name: Pulling code
        run: echo "pulling code"
  Build:
    runs-on: ubuntu-latest
    needs: [Code]
    steps:
      - name: building code
        run: echo "building code"
  Test:
    runs-on: ubuntu-latest
    needs: [Build]
    steps:
      - name: Testing code
        run: echo "testing code"    
  Deploy:
    runs-on: ubuntu-latest
    needs: [Build, Test]
    steps:
      - name: Deploying Code
        run: echo "Deploying code"
    
