name: Main branch code deployment
on:
  # workflow-dispatch:
  push:
    branches: [main, master]

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Pulling code
        run: echo "pulling code"
  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: building code
        run: echo "building code"
  Test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Testing code
        run: echo "testing code"    
  Deploy:
    runs-on: ubuntu-latest
    needs: [code, build]
    steps:
      - name: Deploying Code
        run: echo "Deploying code"
    
